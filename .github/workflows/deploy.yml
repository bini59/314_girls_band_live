name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push image to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: sha-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=long
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    name: Blue/Green deploy to server
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          envs: GITHUB_SHA
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"

            # 최신 docker-compose / nginx config / 배포 스크립트 동기화
            git fetch origin main
            git reset --hard origin/main

            # GHCR pull 권한 (없으면 한 번만 설정)
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin

            # postgres + nginx 가 살아 있는지 확인 — 없으면 부트스트랩
            if ! docker compose ps --services --filter "status=running" | grep -q '^nginx$'; then
              echo "Bootstrapping postgres + nginx + app-blue (first run)"
              APP_IMAGE="ghcr.io/${{ github.repository }}:sha-${GITHUB_SHA}" \
                docker compose --profile app up -d postgres nginx app-blue
              # 첫 부트스트랩이면 blue 가 active 라서 일반 배포 스크립트는 green 으로 전환함
            fi

            # blue/green 배포 (스크립트 내부에서 prisma migrate 도 실행)
            IMAGE_TAG="sha-${GITHUB_SHA}" \
            IMAGE_REPO="ghcr.io/${{ github.repository }}" \
              ./scripts/deploy-blue-green.sh

            # 오래된 이미지 정리
            docker image prune -f

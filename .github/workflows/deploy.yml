name: Deploy

on:
  push:
    branches: [main]

# 같은 시점 다중 배포 차단. main 외에서는 트리거 자체가 안 됨.
concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # 1) 이미지 빌드/푸시는 GitHub-hosted (격리 VM, 무료, 빠른 캐시).
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push image to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: sha-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=long
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 멀티 아키텍처 — amd64 (개발/일반 서버) + arm64 (예: Raspberry Pi, Ampere, Apple Silicon).
          # 배포 서버 아키텍처가 한 가지로 고정되면 그 하나만 남겨 빌드 시간을 줄여도 된다.
          platforms: linux/amd64,linux/arm64

  # ---------------------------------------------------------------------------
  # 2) 실제 배포는 self-hosted runner (배포 서버 그 자체).
  #
  # 보안 가드:
  #   - 이 잡은 `push: main` 이벤트에서만 트리거 (fork PR 트리거 불가).
  #   - 아래 `if` 로 다시 한 번 검증 — 워크플로 트리거 설정이 잘못돼도 fork 코드 실행 차단.
  #   - 러너는 `gbl-prod` 라벨로 등록 권장 (다른 self-hosted 러너와 분리).
  # ---------------------------------------------------------------------------
  deploy:
    name: Blue/Green deploy (self-hosted)
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, linux, gbl-prod]
    timeout-minutes: 15
    environment: production
    permissions:
      contents: read
      packages: read
    defaults:
      run:
        working-directory: ${{ vars.DEPLOY_PATH || '/opt/girls_band_live' }}
    steps:
      - name: Sync repository (fetch + reset to main)
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Log in to GHCR (for image pull)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Bootstrap nginx + postgres if not running
        run: |
          if ! docker compose ps --services --filter "status=running" | grep -q '^nginx$'; then
            echo "Bootstrapping postgres + nginx + app-blue (first run)"
            APP_IMAGE="ghcr.io/${{ github.repository }}:sha-${{ github.sha }}" \
              docker compose --profile app up -d postgres nginx app-blue
          fi

      - name: Blue/Green deploy
        env:
          IMAGE_TAG: sha-${{ github.sha }}
          IMAGE_REPO: ghcr.io/${{ github.repository }}
        run: ./scripts/deploy-blue-green.sh

      - name: Cleanup old images
        run: docker image prune -f

worker_processes auto;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;

  # 프록시 공통 설정 — 모든 server 블록에서 재사용.
  proxy_http_version 1.1;
  proxy_buffering off;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $connection_upgrade;

  # WebSocket / SSE 업그레이드 매핑 (Next.js HMR / streaming response 대응).
  map $http_upgrade $connection_upgrade {
    default upgrade;
    "" "";
  }

  # 활성 색의 upstream 정의는 conf.d/active-upstream.conf 에서 include 한다.
  # 배포 스크립트가 이 파일을 다시 써넣은 뒤 `nginx -s reload` 한다.
  upstream app_backend {
    # `server <name>:3000;` 한 줄. 배포 스크립트가 갱신한다.
    include /etc/nginx/conf.d/active-upstream.conf;
    keepalive 32;
  }

  server {
    listen 80 default_server;
    server_name _;

    # nginx 자체 헬스체크 (compose healthcheck 용).
    location = /healthz {
      access_log off;
      return 200 "ok\n";
    }

    location / {
      proxy_pass http://app_backend;

      # 업스트림이 일시적으로 5xx/연결 거부면 자동 fallback (배포 전환 안전망).
      proxy_next_upstream error timeout http_502 http_503 http_504;
      proxy_connect_timeout 3s;
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
    }
  }
}

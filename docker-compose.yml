services:
  postgres:
    image: postgres:16-alpine
    container_name: gbl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gbl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gbl_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-girls_band_live}
      TZ: Asia/Tokyo
      PGTZ: Asia/Tokyo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gbl} -d ${POSTGRES_DB:-girls_band_live}"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4-standalone
    container_name: gbl-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    name: gbl_postgres_data

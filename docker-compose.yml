services:
  postgres:
    image: postgres:16-alpine
    container_name: gbl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gbl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gbl_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-girls_band_live}
      TZ: Asia/Tokyo
      PGTZ: Asia/Tokyo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gbl} -d ${POSTGRES_DB:-girls_band_live}"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4-standalone
    container_name: gbl-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula
    depends_on:
      postgres:
        condition: service_healthy

  # ============================================================================
  # nginx 리버스 프록시 — blue/green 배포의 트래픽 스위치 역할.
  #
  # - 외부 트래픽은 nginx 만 노출 (`${APP_PORT:-3001}:80`).
  # - app-blue / app-green 은 호스트 포트를 노출하지 않고 내부 네트워크에서만 접근.
  # - 활성 색은 `nginx/conf.d/active-upstream.conf` 의 `server app-XXX:3000;` 한 줄로 표현.
  # - 배포 스크립트가 이 파일을 갱신한 뒤 `nginx -s reload` 로 무중단 전환.
  #
  # 무중단 보장:
  #   - nginx reload 는 워커 graceful 재시작 → 기존 연결은 구버전으로 drain, 신규는 신버전.
  #   - 새 색 컨테이너가 healthy 상태가 된 뒤에만 upstream 전환.
  # ============================================================================
  nginx:
    profiles: ["app"]
    image: nginx:1.27-alpine
    container_name: gbl-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3001}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ============================================================================
  # 어드민 Next.js 앱 (production 빌드, blue/green).
  #
  # 평상시에는 두 색 중 하나만 running. 배포 시 반대 색을 띄워 healthy 가 되면
  # nginx upstream 을 전환한 뒤 구버전을 stop 한다.
  #
  # 직접 실행하지 말 것 — 항상 `scripts/deploy-blue-green.sh` 경유.
  # 최초 부트스트랩만 `docker compose --profile app up -d app-blue nginx`.
  # ============================================================================
  app-blue: &app-template
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    image: ${APP_IMAGE:-girls-band-live:local}
    container_name: gbl-app-blue
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gbl}:${POSTGRES_PASSWORD:-gbl_dev_password}@postgres:5432/${POSTGRES_DB:-girls_band_live}?schema=public
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:?must set ADMIN_PASSWORD_HASH (see README)}
      JWT_SECRET: ${JWT_SECRET:?must set JWT_SECRET (>=32 bytes hex)}
      NODE_ENV: production
      TZ: Asia/Tokyo
    depends_on:
      postgres:
        condition: service_healthy

  app-green:
    <<: *app-template
    container_name: gbl-app-green

volumes:
  postgres_data:
    name: gbl_postgres_data
